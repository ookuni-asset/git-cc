# git-cc default configuration.
#
# This file is the single source of truth for git-cc's user-facing
# defaults. It is loaded as the lowest layer of the config merge chain,
# and is also copied verbatim into your repo by `git cc init` so you
# can edit it as a self-documenting starter.
# Override fields by editing the copied file in your repo, by setting
# values in ~/.config/git-cc/config.toml, or via env vars.

[rules]
# Markdown files describing your project's commit conventions.
# First found wins. Falls back to git-cc's bundled default rules.
search = [
  ".cursor/rules/git-commit.mdc",
  ".gitcc/rules.md",
  "COMMIT_GUIDELINES.md",
]

[llm]
# External LLM CLI to invoke. If the string contains "{prompt}" it is
# substituted; otherwise the prompt is sent on stdin.
#
# Examples:
#   Claude (default):  command = "claude"
#   Cursor:            command = "cursor agent --print {prompt}"
#   Ollama:            command = "ollama run qwen2.5-coder:7b"
#
# Switch via env var: GIT_CC_LLM_COMMAND="cursor agent --print {prompt}" git cc
command     = "claude"
timeout_sec = 60
# If true, exit with error when the LLM call fails (no heuristic fallback).
required    = false

[commit]
# Optional trailer appended to the final message (e.g. Co-Authored-By).
trailer = ""

[push]
enabled    = true
# When true, run `gh repo set-default / auth status / repo sync` before push.
require_gh = false

[language]
# Natural language used for the generated commit message (LLM and the
# heuristic fallback both honor this).
# Common codes: "en" (English), "ja" (Japanese). Any string is passed
# through to the LLM as a hint, so other codes work if your model
# supports them. Override per project in .gitcc.toml or per command
# with `git cc --lang ja`.
output_lang = "en"

[scope]
# Directory prefix → scope name. First match wins. Customize per project.
# Examples:
#   { prefix = "src/api/", scope = "api" },
#   { prefix = "docs/",    scope = "docs" },
mappings = []

[type]
# Glob-based fallback type inference for the heuristic generator.
# When all changed files match docs_globs → "docs"
# When any changed file matches ci_globs → "ci"
# When any changed file matches build_globs → "build"
# When any changed file matches test_globs → "test"
# Otherwise → fallback.
docs_globs  = ["docs/**", "**/*.md", "**/*.mdx"]
ci_globs    = [".github/**", ".gitlab-ci.yml", "Jenkinsfile", ".circleci/**"]
test_globs  = ["**/tests/**", "**/__tests__/**", "**/*.test.*", "**/*.spec.*"]
build_globs = [
  "package.json", "pnpm-lock.yaml", "yarn.lock", "package-lock.json",
  "composer.json", "composer.lock",
  "pyproject.toml", "uv.lock", "poetry.lock", "Pipfile", "Pipfile.lock", "requirements.txt",
  "go.mod", "go.sum",
  "Cargo.toml", "Cargo.lock",
  "Gemfile", "Gemfile.lock",
  "pom.xml", "build.gradle", "build.gradle.kts",
]
fallback = "chore"
